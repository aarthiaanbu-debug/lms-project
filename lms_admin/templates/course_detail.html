<!DOCTYPE html>
<html>

<head>
<title>Course Lessons</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
display:flex;
}

.sidebar{
width:300px;
background:#2c3e50;
color:white;
padding:20px;
height:100vh;
}

.sidebar a{
color:white;
display:block;
margin:10px 0;
}

.content{
flex:1;
padding:40px;
}

video{
width:100%;
max-width:800px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Lessons</h2>

{% for lesson in lessons %}

<a href="?lesson={{lesson.id}}">

{{lesson.title}}

</a>

{% endfor %}

</div>

<div class="content">

<h1>{{course.title}}</h1>

<video controls>

<source src="{{lesson.video.url}}" type="video/mp4">

</video>

<video width="800" controls>
    <source src="{{ lesson.video.url }}" type="video/mp4">
</video>

<p>{{lesson.content}}</p>

</div>

</body>
</html>
