<!DOCTYPE html>
<html>
<head>
<title>Courses</title>
</head>
<body>

<h1>Available Courses</h1>

{% for course in courses %}

{% if messages %}
    {% for message in messages %}
        <p style="color:green">{{ message }}</p>
    {% endfor %}
{% endif %}

<div style="border:1px solid gray;padding:15px;margin:15px;width:300px">

<h2>{{ course.title }}</h2>

{% if course.image %}
<img src="{{ course.image.url }}" width="250">
{% endif %}

<p>{{ course.description }}</p>

<a href="/enroll/{{ course.id }}/">Enroll</a>

</div>

{% endfor %}

</body>
</html>
