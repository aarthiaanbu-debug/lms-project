<!DOCTYPE html>
<html>
<head>
<title>LMS Login</title>

<style>

body{
font-family: Arial;
background: linear-gradient(120deg,#2980b9,#6dd5fa);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
width:300px;
box-shadow:0px 0px 20px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#2980b9;
color:white;
border:none;
padding:10px;
width:100%;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<form method="POST">

{% csrf_token %}

<input type="text" name="username" placeholder="Username">

<input type="password" name="password" placeholder="Password">

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
